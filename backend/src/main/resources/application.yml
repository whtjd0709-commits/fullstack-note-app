# =====================================================
# application.yml — 운영 환경 설정
# DB 접속 정보는 환경변수로 주입 (코드에 하드코딩 금지)
# 로컬 실행: export DB_HOST=localhost DB_USER=root DB_PASS=password
# AWS   실행: /opt/app/.env 파일에서 주입
# =====================================================
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/note_app?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate        # 운영: validate (스키마 자동 변경 금지)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false         # OSIV 비활성화 (성능)

server:
  port: ${SERVER_PORT:8080}

# CORS 허용 출처 (Next.js FE ALB DNS)
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

# Actuator (ALB 헬스 체크용)
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.example.noteapp: DEBUG
