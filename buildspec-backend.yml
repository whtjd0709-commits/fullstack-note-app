version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - java -version

  build:
    commands:
      - chmod +x ./backend/gradlew
      - ./backend/gradlew -p ./backend bootJar -x test

  post_build:
    commands:
      - mkdir -p deploy-backend
      - cp backend/build/libs/note-app.jar deploy-backend/
      - cp backend/Procfile deploy-backend/
      - '[ -d backend/.ebextensions ] && cp -r backend/.ebextensions deploy-backend/ || true'
      - ls -la deploy-backend/

artifacts:
  files:
    - '**/*'
  base-directory: deploy-backend
  discard-paths: no
